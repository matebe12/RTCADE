<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="body" x1="8" y1="18" x2="56" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="screen" x1="20" y1="10" x2="44" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="screenGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Arcade cabinet body -->
  <rect x="12" y="6" width="40" height="52" rx="6" fill="url(#body)" opacity="0.9"/>
  <rect x="14" y="8" width="36" height="48" rx="5" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <!-- Screen -->
  <rect x="18" y="10" width="28" height="20" rx="3" fill="#0f172a"/>
  <rect x="19" y="11" width="26" height="18" rx="2" fill="url(#screen)" opacity="0.85" filter="url(#screenGlow)"/>
  <!-- Scanlines on screen -->
  <line x1="19" y1="14" x2="45" y2="14" stroke="#0f172a" stroke-width="0.5" opacity="0.3"/>
  <line x1="19" y1="17" x2="45" y2="17" stroke="#0f172a" stroke-width="0.5" opacity="0.3"/>
  <line x1="19" y1="20" x2="45" y2="20" stroke="#0f172a" stroke-width="0.5" opacity="0.3"/>
  <line x1="19" y1="23" x2="45" y2="23" stroke="#0f172a" stroke-width="0.5" opacity="0.3"/>
  <line x1="19" y1="26" x2="45" y2="26" stroke="#0f172a" stroke-width="0.5" opacity="0.3"/>
  <!-- "RT" text on screen -->
  <text x="32" y="23" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="10" fill="#ffffff" filter="url(#glow)">RT</text>
  <!-- Joystick -->
  <circle cx="24" cy="38" r="5" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <circle cx="24" cy="37" r="2.5" fill="#818cf8" filter="url(#glow)"/>
  <rect x="23" y="37" width="2" height="4" rx="1" fill="#818cf8"/>
  <!-- Buttons -->
  <circle cx="40" cy="36" r="3" fill="#f43f5e" filter="url(#glow)"/>
  <circle cx="47" cy="36" r="3" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="40" cy="43" r="3" fill="#facc15" filter="url(#glow)"/>
  <circle cx="47" cy="43" r="3" fill="#4ade80" filter="url(#glow)"/>
  <!-- Coin slot -->
  <rect x="28" y="50" width="8" height="2" rx="1" fill="#fbbf24" opacity="0.8"/>
  <!-- Decorative top lights -->
  <circle cx="22" cy="8" r="1.2" fill="#f43f5e" opacity="0.9" filter="url(#glow)"/>
  <circle cx="32" cy="8" r="1.2" fill="#22d3ee" opacity="0.9" filter="url(#glow)"/>
  <circle cx="42" cy="8" r="1.2" fill="#4ade80" opacity="0.9" filter="url(#glow)"/>
</svg>